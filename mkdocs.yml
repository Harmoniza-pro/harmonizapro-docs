site_name: HarmonizaPRO — Documentação
site_description: Central de documentação do sistema de qualificação de leads com IA
site_author: Pedro Vinicius
site_url: https://docs.harmoniza.pro

theme:
  name: material
  language: pt
  logo: assets/logo.png
  favicon: assets/fav.png
  icon:
    logo: material/book-open-variant

  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Modo claro

    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Modo escuro

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow


nav:
  - Início: index.md
  - PRD: prd.md
  - Workflows:
      - "🏗️ Visão Geral": workflows/index.md
      - 🤖 IA Harmoniza:
          - "Agente de IA": workflows/ia-harmoniza/agente-de-ia.md
          - "Chamada Typeform": workflows/ia-harmoniza/chamada-typeform.md
          - "Tool Transferir": workflows/ia-harmoniza/tool-transferir.md
          - "Fluxo Follow Ups": workflows/ia-harmoniza/fluxo-follow-ups.md
      - ⚙️ Operação:
          - "Central de Automação": workflows/operacao/central-automacao.md
          - "Alterar Link Formulário": workflows/operacao/alterar-link-formulario.md
          - "Desempenho Meta Ads": workflows/operacao/desempenho-meta-ads.md
          - "Retroativo - Respostas no ClickUp": workflows/operacao/retroativo-respostas-banco.md
          - "Retroativo - Tarefas do CRM": workflows/operacao/retroativo-tarefas-crm.md
      - 🎯 Hunters: 
          - "Central de Automação": workflows/hunters/central-automacao.md
          - "Typeform Clientes": workflows/hunters/typeform-clientes.md
          - "CRM Hunter": workflows/hunters/crm-hunter.md
          - "Ganho": workflows/hunters/ganho.md
          - "Perda": workflows/hunters/perda.md
      - 📣 Comercial e Marketing: 
          - "Typeform Formulários [1/2]": workflows/comercial/typeform-formularios-1.md
          - "Typeform Formulários [2/2]": workflows/comercial/typeform-formularios-2.md
          - "Calendly Event Create": workflows/comercial/calendly-event-create.md
          - "Distribuição de Leads": workflows/comercial/distribuicao-leads.md
          - "Envio Mensagem Parcial": workflows/comercial/envio-mensagem-parcial.md
          - "Transferência de Leads": workflows/comercial/transferencia-leads.md
          - "Conversão de Campos": workflows/comercial/conversao-campos.md
          - "Convite Lead [1/3] Scheduler": workflows/comercial/convite-lead-1.md
          - "Convite Lead [2/3] Mensagem": workflows/comercial/convite-lead-2.md
          - "Convite Lead [3/3] Resposta": workflows/comercial/convite-lead-3.md
          - "Envio Mensagem Clientes": workflows/comercial/envio-mensagem-clientes.md
          - "Documentar Msgs CRM": workflows/comercial/documentar-mensagens-crm.md
          - "Evento Pixel Lead Score": workflows/comercial/evento-pixel-lead-score.md
          - "Update Deal (Dispatcher)": workflows/comercial/pipedrive-update-deal.md
          - "Typeform Banco de Dados": workflows/comercial/typeform-banco-dados.md
          - "Evento Lead Clientes": workflows/comercial/evento-lead-clientes.md
          - "Atualizar Dados Cliente": workflows/comercial/atualizar-dados-cliente.md
          - "Dashboard Planilha": workflows/comercial/dashboard-planilha-atualizada.md
          - "Retroativo UTM": workflows/comercial/retroativo-utm.md
          - "Leads Parados": workflows/comercial/leads-parados.md
      - 📍 Tracking: 
          - "GTM Typeform Receptor": workflows/tracking/gtm-typeform-1-receptor.md
          - "GTM Typeform Enriquecimento": workflows/tracking/gtm-typeform-2-enriquecimento.md
          - "GTM Typeform Pixel CAPI": workflows/tracking/gtm-typeform-3-pixel.md
      - 📋 Templates: 
          - "Organizar ClickUp": workflows/templates/organizar-clickup.md
          - "RabbitMQ": workflows/templates/rabbitmq.md
      - 📝 Formulários Clickup: 
          - "Central de Automações": workflows/clickup/formularios-1-central.md
          - "TaskCreated": workflows/clickup/formularios-2-created.md
          - "TaskDeleted": workflows/clickup/formularios-3-deleted.md
          - "TaskUpdated": workflows/clickup/formularios-4-updated.md
  - Playbooks:
          - "Inicio": "playbooks/index.md"
          - "Abordagem Perfil": playbooks/abordagem-por-perfil.md
          - "Respostas a  Objeções": playbooks/respostas-objecoes.md
  - Runbooks: 
          - "Inicio": "runbooks/index.md"
          - "HandOff falhando": "runbooks/handoff-falhando.md"
          - "Webhook Fora": "runbooks/webhook-fora.md"
  - Base de Conhecimento:
          - "🏥Clínicas": base/base-conhecimento-clinicas.md
  - Operação:
          - "Mapa de Dependências": operacao/dependencias.md
          - "Changelog": operacao/changelog.md
          - "Métricas Diárias": operacao/dashboard.md
          - "Monitoramento de Custos": operacao/custos.md
  - Equipe: equipe.md


extra_css:
  - stylesheets/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true
      title: Nesta página
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - md_in_html


plugins:
  - search:
      lang: pt

extra:
  generator: false
