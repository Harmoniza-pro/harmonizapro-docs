site_name: HarmonizaPRO — Documentação
site_description: Central de documentação do sistema de qualificação de leads com IA
site_author: Pedro Vinicius
site_url: https://docs.harmoniza.pro

theme:
  name: material
  language: pt
  logo: assets/logo.png
  favicon: assets/fav.png
  icon:
    logo: material/book-open-variant

  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Modo claro

    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Modo escuro

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow


nav:
  - Início: index.md
  - PRD:
      - "PRD 001 — Agente de Qualificação IA": prd-001-agente-qualificacao.md
  - Workflows:
      - Índice de Workflows: workflows/index.md
      - "Agente de IA (entrada principal)": workflows/agente-de-ia.md
      - "Chamada Typeform": workflows/chamada-typeform.md
      - "Tool Transferir (Handoff)": workflows/tool-transferir.md
      - "Fluxo Follow Ups": workflows/fluxo-follow-ups.md
      - "⏱️ Métricas Diárias": workflows/metricas-diarias.md
      - "💰 Monitoramento de Custos": workflows/monitoramento-custos.md
  - Playbooks:
      - Índice: playbooks/index.md
      - "Abordagem Inicial por Perfil": playbooks/abordagem-por-perfil.md
      - "Respostas para Objeções": playbooks/respostas-objecoes.md
  - Runbooks:
      - Índice: runbooks/index.md
      - "Webhook Fora do Ar": runbooks/webhook-fora.md
      - "Handoff Falhando": runbooks/handoff-falhando.md
  - Base de Conhecimento:
      - "Clínicas e Protocolos": base-conhecimento-clinicas.md
  - Operação:
      - "📊 Dashboard de Métricas":  operacao/dashboard.md
      - "💰 Custos por Workflow": operacao/custos.md
      - "🔗 Mapa de Dependências": operacao/dependencias.md
      - "📋 Changelog": operacao/changelog.md
  - Equipe: equipe.md


extra_css:
  - stylesheets/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true
      title: Nesta página
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - md_in_html


plugins:
  - search:
      lang: pt

extra:
  generator: false
