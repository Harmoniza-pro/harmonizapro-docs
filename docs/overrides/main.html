{% extends "base.html" %}

{% block extrahead %}
  <style>
    /* Logo sizing in header */
    .md-header__button.md-logo img {
      height: 32px;
      width: auto;
      object-fit: contain;
    }

    /* Hero section for homepage */
    .hp-hero {
      background: linear-gradient(135deg, #111111 0%, #1A1A1A 50%, #252525 100%);
      border: 1px solid #C8A24E;
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }

    .hp-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #C8A24E, transparent);
    }

    .hp-hero img {
      max-height: 60px;
      margin-bottom: 16px;
    }

    .hp-hero h2 {
      color: #C8A24E !important;
      border: none !important;
      margin: 0 !important;
      padding: 0 !important;
      font-size: 1.1em;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .hp-hero p {
      color: #999 !important;
      margin-top: 8px;
      font-size: 0.9em;
    }

    /* Status cards */
    .hp-status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }

    .hp-card {
      background: linear-gradient(135deg, #1A1A1A, #252525);
      border: 1px solid #3A3A3A;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: all 0.2s ease;
    }

    .hp-card:hover {
      border-color: #C8A24E;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(200, 162, 78, 0.15);
    }

    .hp-card-number {
      font-size: 2em;
      font-weight: 700;
      color: #C8A24E;
      line-height: 1;
    }

    .hp-card-label {
      font-size: 0.8em;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }
  </style>
{% endblock %}

{% block footer %}
  <footer class="md-footer">
    <div class="md-footer-meta md-typeset">
      <div class="md-footer-meta__inner md-grid" style="text-align: center; padding: 24px 0;">
        <span style="color: #C8A24E; font-weight: 600;">HarmonizaPRO</span>
        <span style="color: #666; margin: 0 8px;">•</span>
        <span style="color: #999; font-size: 0.85em;">Documentação Interna</span>
        <span style="color: #666; margin: 0 8px;">•</span>
        <span style="color: #999; font-size: 0.85em;">© 2026</span>
      </div>
    </div>
  </footer>
{% endblock %}
